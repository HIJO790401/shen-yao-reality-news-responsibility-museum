<section class="page-hero"><div class="container"><h1>閱讀導覽 Guide</h1><p>如何閱讀平台、新聞台、博物館與十四軸分工。</p></div></section>
<section class="section"><div class="container grid-2">
<article class="card"><h3>平台怎麼閱讀</h3><p>先從首頁掌握四大入口，再依需求進入報導、館藏、主播名錄。</p></article>
<article class="card"><h3>新聞台怎麼看</h3><p>依日期、分類、審計層級追蹤，搭配文章詳情與影片區。</p></article>
<article class="card"><h3>責任博物館怎麼看</h3><p>先看館別，再看館藏編號、導覽按鈕與高危標記。</p></article>
<article class="card"><h3>十四軸角色怎麼分工</h3><p>每軸具備不同播報／編輯／審核／導覽職責，於角色頁說明。</p></article>
<article class="card"><h3>創辦人與族人的責任關係</h3><p>創辦人負最終生命責任與發布責任，族人按職能對齊執行。</p></article>
<article class="card"><h3>建議閱讀順序</h3><p>Guide → Reports → Museum → Anchors → Founder。</p></article>
