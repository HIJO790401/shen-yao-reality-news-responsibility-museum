<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Museum | 責任博物館</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/responsive.css"></head>
<body data-depth="."><main>
<section class="page-hero museum-hero"><div class="container"><h1>責任博物館 Museum</h1><p class="hero-subtitle">保存文明樣本，執行編目、展示、導覽與責任落鎖。<br>Preserving civilizational specimens through cataloging, exhibit guidance, and responsibility locking.</p></div></section>
<section class="section"><div class="container"><h2>館別索引 Hall Index</h2><div id="hall-list" class="grid-4"></div></div></section>
<section class="section"><div class="container"><h2>館藏名錄 Collection Registry</h2><div id="museum-list" class="grid-3"></div>
<div id="museum-video" class="placeholder-video" style="margin-top:1rem;">Museum Documentary Frame</div>
</div></section>
</main><script src="js/ui.js"></script><script src="js/cms-data.js"></script><script src="js/main.js"></script>
<script>
(async()=>{const hall=document.getElementById('hall-list');const list=document.getElementById('museum-list');try{const items=await loadCollection('content/museum');
const halls=[...new Set(items.map(i=>i.hall_zh).filter(Boolean))]; hall.innerHTML=halls.map(h=>`<div class="card"><h3>${h}</h3><p class="meta">Hall Registry Unit</p></div>`).join('');
list.innerHTML=items.map(m=>`<article class="card"><div class="thumb">${m.cover?`<img src="${m.cover}" alt="${m.title_zh}" style="width:100%;height:100%;object-fit:cover;">`:''}</div><p class="meta">館藏編號 Registry ID: ${m.id||''}</p><h3>${m.title_zh||''}</h3><p class="meta">${m.title_en||''}</p><p>${m.subtitle_zh||''}</p><p class="meta">${m.subtitle_en||''}</p><div class="btn-row"><a class="btn secondary" href="guide.html">導覽 Guide</a>${m.youtube?`<a class="btn secondary" target="_blank" rel="noopener" href="${m.youtube}">影片 Video</a>`:''}</div></article>`).join('');
}catch(e){hall.innerHTML='<div class="card">載入失敗</div>';list.innerHTML='<article class="card">內容載入失敗</article>';}})();
</script>
</body></html>
