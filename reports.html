<!doctype html><html lang="zh-Hant"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports | 沈耀國際實相新聞台</title>
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/responsive.css"></head>
<body data-depth="."><main>
<section class="page-hero"><div class="container"><h1>新聞台報導 Reports</h1><p class="hero-subtitle">用於公共事件播報、風險敘事拆解、責任審計映射與回放索引。<br>For public-event reporting, risk narrative audits, responsibility mapping, and replay indexing.</p></div></section>
<section class="section"><div class="container">
<h2>報導名錄 Article Registry</h2><div id="reports-list" class="grid-3"></div>
</div></section>
</main><script src="js/ui.js"></script><script src="js/cms-data.js"></script><script src="js/main.js"></script>
<script>
(async()=>{
  const list=document.getElementById('reports-list');
  try{
    const items=await loadCollection('content/reports');
    items.sort((a,b)=>new Date(b.date)-new Date(a.date));

    list.innerHTML=items.map((r)=>{
      const slug=entrySlug(r);
      const detailHref=slug?`article.html?slug=${encodeURIComponent(slug)}`:'article.html';
      return `<article class="card"><div class="thumb">${r.cover?`<img src="${r.cover}" alt="${r.title_zh||''}" style="width:100%;height:100%;object-fit:cover;">`:''}</div><p class="meta">${r.date||''}｜分類 Category: ${r.category||''}</p><h3>${r.title_zh||''}</h3><p class="meta">${r.title_en||''}</p><p>${r.summary_zh||''}</p><p class="meta">${r.summary_en||''}</p><div class="btn-row"><a class="btn secondary" href="${detailHref}">閱讀詳情 Read</a>${r.youtube?`<a class="btn secondary" href="${r.youtube}" target="_blank" rel="noopener">前往 YouTube</a>`:''}</div></article>`;
    }).join('');

    if (!items.length) {
      list.innerHTML='<article class="card">目前尚無報導，請由 CMS 新增文章。</article>';
    }
  }catch(e){
    list.innerHTML='<article class="card">內容載入失敗，請稍後重試。</article>';
  }
})();
</script>
</body></html>
