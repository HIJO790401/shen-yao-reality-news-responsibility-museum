backend:
  name: git-gateway
  repo: HIJO790401/shen-yao-reality-news-responsibility-museum
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/1ee6a6f9-21ae-4288-a106-c69c5dc90155/pkce
  auth_token_endpoint: /sites/1ee6a6f9-21ae-4288-a106-c69c5dc90155/token
  gateway_url: https://gateway.decapbridge.com

  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://charming-torrone-76a6a1.netlify.app

media_folder: "public/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "reports"
    label: "Reports"
    folder: "content/reports"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    format: frontmatter
    extension: md
    fields:
      - { label: "Title ZH", name: "title_zh", widget: "string" }
      - { label: "Title EN", name: "title_en", widget: "string" }
      - { label: "Summary ZH", name: "summary_zh", widget: "text" }
      - { label: "Summary EN", name: "summary_en", widget: "text" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Category", name: "category", widget: "string" }
      - { label: "Cover", name: "cover", widget: "image", required: false }
      - { label: "YouTube URL", name: "youtube", widget: "string", required: false }
      - { label: "Body ZH", name: "body_zh", widget: "text" }
      - { label: "Body EN", name: "body_en", widget: "text" }

  - name: "museum"
    label: "Museum"
    folder: "content/museum"
    create: true
    slug: "{{slug}}"
    format: frontmatter
    extension: md
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "Title ZH", name: "title_zh", widget: "string" }
      - { label: "Title EN", name: "title_en", widget: "string" }
      - { label: "Subtitle ZH", name: "subtitle_zh", widget: "text" }
      - { label: "Subtitle EN", name: "subtitle_en", widget: "text" }
      - { label: "Guide ZH", name: "guide_zh", widget: "text" }
      - { label: "Guide EN", name: "guide_en", widget: "text" }
      - { label: "Cover", name: "cover", widget: "image", required: false }
      - { label: "YouTube URL", name: "youtube", widget: "string", required: false }
      - { label: "Body ZH", name: "body_zh", widget: "text" }
      - { label: "Body EN", name: "body_en", widget: "text" }
      - { label: "Hall ZH", name: "hall_zh", widget: "string" }
      - { label: "Hall EN", name: "hall_en", widget: "string" }

  - name: "anchors"
    label: "Anchors"
    folder: "content/anchors"
    create: true
    slug: "{{slug}}"
    format: frontmatter
    extension: md
    fields:
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Name ZH", name: "name_zh", widget: "string" }
      - { label: "Name EN", name: "name_en", widget: "string" }
      - { label: "Role ZH", name: "role_zh", widget: "string" }
      - { label: "Role EN", name: "role_en", widget: "string" }
      - { label: "Bio ZH", name: "bio_zh", widget: "text" }
      - { label: "Bio EN", name: "bio_en", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "YouTube URL", name: "youtube", widget: "string", required: false }

  - name: "founder"
    label: "Founder"
    files:
      - label: "Founder Profile"
        name: "profile"
        file: "content/founder/profile.md"
        fields:
          - { label: "Name ZH", name: "name_zh", widget: "string" }
          - { label: "Name EN", name: "name_en", widget: "string" }
          - { label: "Location ZH", name: "location_zh", widget: "string" }
          - { label: "Location EN", name: "location_en", widget: "string" }
          - { label: "Identity ZH", name: "identity_zh", widget: "text" }
          - { label: "Identity EN", name: "identity_en", widget: "text" }
          - { label: "Statement ZH", name: "statement_zh", widget: "text" }
          - { label: "Statement EN", name: "statement_en", widget: "text" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Website", name: "website", widget: "string" }
          - { label: "Image", name: "image", widget: "image" }
          - { label: "YouTube URL", name: "youtube", widget: "string", required: false }
