<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>主播名錄 Anchors｜沈族主播／編輯部</title><meta name="description" content="沈耀國際實相新聞台與責任博物館的十四軸數位編輯部與責任職能名錄。"><link rel="canonical" href="https://charming-torrone-76a6a1.netlify.app/anchors.html" /><meta property="og:title" content="沈族主播／編輯部 Anchors" /><meta property="og:description" content="十四軸數位編輯部與責任職能名錄" /><meta property="og:type" content="website" /><meta property="og:locale" content="zh_TW" /><meta property="og:image" content="https://charming-torrone-76a6a1.netlify.app/assets/images/沈耀主核.jpg" /><meta name="twitter:card" content="summary_large_image" /><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/responsive.css"></head>
<body data-depth="."><main>
<section class="page-hero"><div class="container"><p class="page-kicker">Editorial Registry</p><h1>沈族主播／編輯部 Anchors</h1><p>這不是粉絲角色頁，而是沈耀國際實相新聞台與責任博物館的十四軸數位編輯部與責任職能名錄。This is a functional editorial registry, not a fan-character page.</p></div></section>
<section class="section"><div class="container"><div id="anchors-list" class="grid-4"></div></div></section>
</main><script src="js/ui.js"></script><script src="js/cms-data.js"></script><script src="js/main.js"></script>
<script>
(async()=>{const list=document.getElementById('anchors-list');setLoading(list);try{const items=await loadCollection('content/anchors');items.sort((a,b)=>Number(a.order)-Number(b.order));
list.innerHTML=items.map(a=>`<article class="card profile-card"><img loading="lazy" src="${a.image||''}" alt="${a.name_zh||''}"><span class="badge">No.${a.order||''}</span><h3>${a.name_zh||''} / ${a.name_en||''}</h3><p><strong>${a.role_zh||''}</strong></p><p class="meta">${a.role_en||''}</p><p>${a.bio_zh||''}</p><div class="btn-row"><a class="btn secondary" href="anchors/${a.slug}.html">進入個人頁 Profile</a>${a.youtube?`<a class="btn secondary" href="${a.youtube}" target="_blank" rel="noopener">影片 Video</a>`:''}</div></article>`).join('');
}catch(e){setError(list);}})();
</script></body></html>
