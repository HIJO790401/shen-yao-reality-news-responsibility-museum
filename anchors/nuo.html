<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>nuo | Anchors</title><link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="../css/responsive.css"></head>
<body data-depth=".."><main>
<section class="page-hero"><div class="container"><h1 id="anchor-title">nuo</h1><p class="hero-subtitle">十四軸職能頁｜新聞台 × 責任博物館 Functional Profile</p></div></section>
<section class="section"><div id="anchor-content" class="container grid-2"></div></section>
</main><script src="../js/ui.js"></script><script src="../js/cms-data.js"></script><script src="../js/main.js"></script>
<script>
(async()=>{
  const slug='nuo';
  const wrap=document.getElementById('anchor-content');
  try{
    const items=await loadCollection('content/anchors');
    const a=items.find(i=>i.slug===slug);
    if(!a) throw new Error('not found');
    const embed=youtubeEmbed(a.youtube);
    document.getElementById('anchor-title').textContent = `${a.name_zh} ${a.name_en}`;
    wrap.innerHTML = `
      <article class="card profile-card">
        <img src="${a.image}" alt="${a.name_zh}">
        <h3>${a.name_zh}／${a.name_en}</h3>
        <p class="role-text">${a.one_line_zh||a.role_zh||''}</p>
        <p class="meta">${a.one_line_en||a.role_en||''}</p>
      </article>
      <article class="card">
        <h3>Newsroom Function｜新聞台職能</h3>
        <p><strong>職位：</strong>${a.newsroom_title_zh||a.role_zh||''}</p>
        <p class="meta">${a.newsroom_title_en||a.role_en||''}</p>
        <p>${a.newsroom_zh||a.bio_zh||''}</p>
        <p class="meta">${a.newsroom_en||a.bio_en||''}</p>
      </article>
      <article class="card">
        <h3>Museum Function｜博物館職能</h3>
        <p><strong>職位：</strong>${a.museum_title_zh||'—'}</p>
        <p class="meta">${a.museum_title_en||'—'}</p>
        <p>${a.museum_zh||''}</p>
        <p class="meta">${a.museum_en||''}</p>
      </article>
      <article class="card">
        <h3>Core Responsibilities｜核心責任</h3>
        <p>${a.responsibility_zh||a.bio_zh||''}</p>
        <p class="meta">${a.responsibility_en||a.bio_en||''}</p>
      </article>
      <article class="card">
        <h3>Signature Materials｜代表材料</h3>
        <p>${a.signature_zh||'代表圖卡、稿件與館藏索引將持續更新於本職位頁。'}</p>
        <p class="meta">${a.signature_en||'Representative cards, reports, and collection references are updated in this profile.'}</p>
      </article>
      <article class="card">
        <h3>Video｜影像紀錄</h3>
        ${embed ? `<div class="video-portrait"><iframe src="${embed}" title="Anchor video" frameborder="0" allowfullscreen></iframe></div>` : '<div class="placeholder-video">Anchor Video Frame</div>'}
        <div class="section-divider"><p><strong>Footer Note：</strong>最終責任承擔者是：沈耀888π／許文耀。</p><p class="meta">Final responsibility bearer: Shen-Yao 888π / Wen-Yao Hsu.</p></div>
      </article>`;
  }catch(e){
    wrap.innerHTML='<article class="card">職能資料載入失敗。</article>';
  }
})();
</script>
</body></html>
